name: Build and Test

on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Source
      uses: actions/checkout@v4
    - name: Build
      run: |
        gcc src/*.c \
            tests/test_transform.c \
            -Iinclude \
            -lm \
            -o motor_test
    - name: Run Tests
      run: ./motor_test   
    - name: Install cppcheck
      run: sudo apt install cppcheck
    - name: Run cppcheck
      run: cppcheck src include     